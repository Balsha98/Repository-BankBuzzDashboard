<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" type="image/x-icon" href="assets/media/app-icon.png" />
  <title>JS | BankBuzz App</title>
</head>

<body>
  <nav>
    <p id="welcome-txt">LogIn To Get Started</p>
    <img src="assets/media/app-logo.png" alt="AppLogo" />
    <form id="login-form">
      <input type="text" id="username" name="username" placeholder="initials" />
      <input type="password" id="password" name="password" placeholder="password" />
      <label id="in-btn">&#9755;</label>
    </form>
  </nav>
  <div id="main-div">
    <div id="header-div">
      <div id="balance-div">
        <p>Current Balance:</p>
        <p>Date & Time: <span id="current-date"></span></p>
      </div>
      <p id="current-balance"></p>
    </div>
    <div id="transaction-div">
      <div id="transactions-list"></div>
      <div id="transfer-div">
        <h3>Transfer Money</h3>
        <form class="type-forms transfer-form">
          <div>
            <input type="text" id="send-money-to" />
            <label>Transfer To</label>
          </div>
          <div>
            <input type="number" id="transfer-amount" />
            <label>Amount</label>
          </div>
          <label class="submit-btns transfer-btn"><span>&#9755;</span></label>
        </form>
      </div>
      <div id="request-div">
        <h3>Request Loan</h3>
        <form class="type-forms request-form">
          <div>
            <input type="number" id="request-amount" />
            <label>Amount</label>
          </div>
          <label class="submit-btns request-btn"><span>&#9755;</span></label>
        </form>
      </div>
      <div id="close-div">
        <h3>Log Out</h3>
        <form class="type-forms logout-form">
          <div>
            <input type="text" id="confirm-name" />
            <label>Username</label>
          </div>
          <div>
            <input type="password" id="confirm-pass" />
            <label>Password</label>
          </div>
          <label class="submit-btns out-btn"><span>&#9755;</span></label>
        </form>
      </div>
      <div id="account-data">
        <p class="money-data">
          IN&nbsp;&nbsp;&nbsp;<span id="money-in"></span>
        </p>
        <p class="money-data">
          OUT&nbsp;&nbsp;&nbsp;<span id="money-out"></span>
        </p>
        <p class="money-data">
          INTR&nbsp;&nbsp;&nbsp;<span id="interest-rate"></span>
        </p>
        <p class="money-data sorting-tag">
          <span id="sorting-pointer">&#9757;</span> SORT
        </p>
      </div>
      <div id="session-div">
        <p>Your session ends in: <span id="session"></span></p>
      </div>
    </div>
  </div>

  <script src="assets/javascript/project.js"></script>
  <script src="assets/javascript/lectures1.js"></script>
  <script src="assets/javascript/lectures2.js"></script>
  <script src="assets/javascript/challenges.js"></script>
</body>

</html>
